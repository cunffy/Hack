version: "3.9"

services:
  cryogram-build:
    build:
      context: .
      dockerfile: Dockerfile
    image: cryogram-builder:latest
    container_name: cryogram-build
    privileged: true        # Required for loopback mounts during ISO creation
    volumes:
      # Mount Cryogram source into the build
      - ../:/build/cryogram-src:ro
      # Output directory — ISO ends up here on your host
      - ./output:/build/output
    environment:
      - CRYOGRAM_VERSION=1.0
      - CRYOGRAM_CODENAME=obsidian
    # Build takes 30-90 min depending on your internet speed
    # Watch progress: docker logs -f cryogram-build
