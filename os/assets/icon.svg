<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="88" fill="none" stroke="#1e2d40" stroke-width="1.5"/>

  <!-- C letterform -->
  <path d="M 168 80
           A 68 68 0 1 0 168 176
           L 152 176
           A 52 52 0 1 1 152 80 Z"
        fill="#00d4ff"
        filter="url(#glow)"
        opacity="0.9"/>

  <!-- Small accent dots at C tips -->
  <circle cx="160" cy="80" r="6" fill="#00ff88"/>
  <circle cx="160" cy="176" r="6" fill="#00ff88"/>
</svg>
