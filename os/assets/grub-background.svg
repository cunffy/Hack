<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e2d40" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="216" x2="1920" y2="216"/>
    <line x1="0" y1="432" x2="1920" y2="432"/>
    <line x1="0" y1="648" x2="1920" y2="648"/>
    <line x1="0" y1="864" x2="1920" y2="864"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
  </g>

  <!-- Corner accents -->
  <path d="M 0 0 L 120 0 L 120 4 L 4 4 L 4 120 L 0 120 Z" fill="#00d4ff" opacity="0.6"/>
  <path d="M 1920 0 L 1800 0 L 1800 4 L 1916 4 L 1916 120 L 1920 120 Z" fill="#00d4ff" opacity="0.6"/>
  <path d="M 0 1080 L 120 1080 L 120 1076 L 4 1076 L 4 960 L 0 960 Z" fill="#00d4ff" opacity="0.6"/>
  <path d="M 1920 1080 L 1800 1080 L 1800 1076 L 1916 1076 L 1916 960 L 1920 960 Z" fill="#00d4ff" opacity="0.6"/>

  <!-- Center logo mark: C for Cryogram -->
  <g transform="translate(960,480)" filter="url(#blur)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.15"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.08"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.05"/>
  </g>

  <!-- Hexagon grid pattern (subtle) -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.8" fill="none">
    <polygon points="960,340 994,360 994,400 960,420 926,400 926,360"/>
    <polygon points="1028,300 1062,320 1062,360 1028,380 994,360 994,320"/>
    <polygon points="892,300 926,320 926,360 892,380 858,360 858,320"/>
    <polygon points="1096,340 1130,360 1130,400 1096,420 1062,400 1062,360"/>
    <polygon points="824,340 858,360 858,400 824,420 790,400 790,360"/>
    <polygon points="960,420 994,440 994,480 960,500 926,480 926,440"/>
    <polygon points="892,380 926,400 926,440 892,460 858,440 858,400"/>
    <polygon points="1028,380 1062,400 1062,440 1028,460 994,440 994,400"/>
  </g>
</svg>
