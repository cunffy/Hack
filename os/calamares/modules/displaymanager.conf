---
# Cryogram OS — Calamares display manager configuration
# Tells Calamares to configure LightDM for the Cryogram session after install.

displaymanagers:
  - lightdm

# Set the default session to the Cryogram OS session (not a generic desktop)
defaultDesktopEnvironment:
  executable: "/usr/local/bin/cryogram-session"
  desktopFile: "cryogram"

# Autologin is handled by /etc/lightdm/lightdm.conf.d/50-cryogram.conf
# which our 0545 hook installs. Don't override it here.
doAutologin: false

# Don't write a system-level LightDM config (our .conf.d/ file handles it)
basicSetup: false
sysconfigSetup: false
