---
# Cryogram OS — Calamares partition module configuration

# For UEFI systems (all modern machines, including those with Windows)
efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: "300M"
efiSystemPartitionName: "EFI System Partition"

# Default filesystem for the root partition
defaultFileSystemType: "ext4"

# "erase" shows "Erase disk" as the default/highlighted option.
# This is how users replace Windows — they see "Erase disk" and click it.
# Other options (alongside existing partition, manual) are still available.
initialPartitioningChoice: "erase"

# No swap partition by default — swap file can be added later if needed
initialSwapChoice: "none"

# Allow advanced users to partition manually (important for dual-boot scenarios)
allowManualPartitioning: true

# Minimum disk space required for installation (GB)
requiredStorage: 15.0
