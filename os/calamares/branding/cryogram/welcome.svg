<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="800" height="500" fill="#0a0e14"/>

  <!-- Subtle grid lines -->
  <g stroke="#00d4ff" stroke-width="0.3" opacity="0.07">
    <line x1="0" y1="50"  x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="50"  y1="0" x2="50"  y2="500"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="550" y1="0" x2="550" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="650" y1="0" x2="650" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- Glow orb behind logo -->
  <radialGradient id="glow" cx="50%" cy="42%" r="35%">
    <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#glow)"/>

  <!-- Shield icon (centered, top area) -->
  <g transform="translate(340, 60) scale(0.6)">
    <path d="M100 30 L155 55 L155 105 C155 140 100 170 100 170 C100 170 45 140 45 105 L45 55 Z"
          fill="#0d1117" stroke="#00d4ff" stroke-width="3"/>
    <rect x="82" y="102" width="36" height="28" rx="4" fill="#00d4ff" opacity="0.9"/>
    <path d="M88 102 L88 90 C88 79 112 79 112 90 L112 102"
          fill="none" stroke="#00d4ff" stroke-width="5" stroke-linecap="round"/>
    <circle cx="100" cy="114" r="5" fill="#0a0e14"/>
    <rect x="97.5" y="114" width="5" height="9" fill="#0a0e14"/>
  </g>

  <!-- Horizontal rule -->
  <line x1="160" y1="200" x2="640" y2="200" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

  <!-- Product name -->
  <text x="400" y="260"
        font-family="monospace, 'Courier New'" font-size="52" font-weight="bold"
        fill="#00d4ff" text-anchor="middle" letter-spacing="8">CRYOGRAM</text>

  <!-- Tagline -->
  <text x="400" y="300"
        font-family="monospace, 'Courier New'" font-size="16"
        fill="#8b949e" text-anchor="middle" letter-spacing="4">SECURE OPERATIONS SYSTEM</text>

  <!-- Bottom rule -->
  <line x1="160" y1="330" x2="640" y2="330" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

  <!-- Version / install hint -->
  <text x="400" y="390"
        font-family="monospace, 'Courier New'" font-size="13"
        fill="#3d4a55" text-anchor="middle" letter-spacing="2">VERSION 1.0</text>

  <!-- Corner accents -->
  <polyline points="20,20 20,50 50,50"   fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <polyline points="780,20 780,50 750,50" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <polyline points="20,480 20,450 50,450"   fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  <polyline points="780,480 780,450 750,450" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
</svg>
